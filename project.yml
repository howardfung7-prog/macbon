name: MacBon
options:
  bundleIdPrefix: com.macbon
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: MacBon
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    INFOPLIST_FILE: TapMac/Info.plist
    CODE_SIGN_ENTITLEMENTS: TapMac/TapMac.entitlements
    # 菜单栏应用，不显示在 Dock
    GENERATE_INFOPLIST_FILE: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  MacBon:
    type: application
    platform: macOS
    sources:
      - path: TapMac
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    frameworks:
      - sdk: IOKit.framework
      - sdk: AVFoundation.framework
      - sdk: CoreAudio.framework
    entitlements:
      path: TapMac/TapMac.entitlements
